[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm && pnpm install && NODE_ENV=production BASE_PATH=/ PORT=3000 pnpm --filter @workspace/scamshield run build && cp -r artifacts/scamshield/dist/public artifacts/api-server/public && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.healthchecks]]
type = "PATH"
path = "/api/healthz"
